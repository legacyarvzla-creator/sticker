<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* UI Limpia */
        #ui { 
            position: absolute; z-index: 1000; bottom: 30px; left: 50%; 
            transform: translateX(-50%); width: 100%; text-align: center;
        }

        .btn { 
            padding: 18px 36px; border-radius: 50px; border: none; 
            background: linear-gradient(45deg, #00f2ff, #00c8ff); 
            color: #000; font-weight: bold; font-size: 18px; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,242,255,0.4);
            cursor: pointer; transition: all 0.3s ease;
        }
        
        .btn:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(0,242,255,0.2); }
    </style>
</head>
<body>

    <div id="ui">
        <button id="startBtn" class="btn">Iniciar AR</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;" 
             embedded renderer="colorManagement: true; alpha: true" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="./video.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            
            <a-entity id="videoContainer" position="0 0 0" rotation="0 0 0">
                <a-video src="#vid" 
                         width="1" height="1" 
                         position="0 0 0.01" 
                         material="shader: flat; blending: additive; transparent: true; side: double">
                </a-video>
            </a-entity>
            
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector("#startBtn");
        const sceneEl = document.querySelector('a-scene');
        const video = document.querySelector("#vid");

        btn.addEventListener('click', () => {
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); // Encender cámara
            video.play();     // Encender video + audio
            btn.style.display = "none";
        });
    </script>
</body>
</html>
