<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: black; }
        #ui { 
            position: absolute; z-index: 9999; bottom: 20px; left: 50%; 
            transform: translateX(-50%); width: 100%; text-align: center;
        }
        button { 
            padding: 15px 30px; border-radius: 30px; border: none; 
            background: #e91e63; color: white; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">
        <button id="startBtn">ACTIVAR CÁMARA</button>
    </div>

    <video id="vid" src="./video.mp4" loop crossorigin="anonymous" muted playsinline webkit-playsinline style="display:none"></video>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" 
         embedded color-space="sRGB" 
         renderer="colorManagement: true, physicallyCorrectLights" 
         vr-mode-ui="enabled: false" 
         device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
<a-entity mindar-image-target="targetIndex: 0">
    <a-plane color="blue" opacity="0.5" width="1" height="1" position="0 0 0"></a-plane>
    
   <a-video src="#tuVideoID" 
         width="1" 
         height="1" 
         position="0 0 0" 
         rotation="0 0 0">
</a-video>
</a-entity>
       
            
    </a-scene>

    <script>
        const btn = document.querySelector("#startBtn");
        const sceneEl = document.querySelector('a-scene');
        const video = document.querySelector("#vid");

        btn.addEventListener('click', () => {
            // 1. Iniciamos la escena de MindAR manualmente
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); 
            
            // 2. Despertamos el video
            video.play();
            
            // 3. Quitamos el botón
            btn.style.display = "none";
        });
    </script>
</body>
</html>
