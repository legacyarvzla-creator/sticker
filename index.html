<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <script>
      // Registramos el shader antes de que cargue la escena
      AFRAME.registerShader('chromakey', {
        schema: {
          src: {type: 'map'},
          color: {type: 'color', default: '0 1 0'},
          threshold: {type: 'number', default: 0.1}
        },
        init: function(data) {
          const videoTexture = new THREE.VideoTexture(data.src);
          videoTexture.minFilter = THREE.LinearFilter;
          this.material = new THREE.ShaderMaterial({
            uniforms: {
              tex: {value: videoTexture},
              color: {value: new THREE.Color(data.color)},
              threshold: {value: data.threshold}
            },
            vertexShader: `
              varying vec2 vUv;
              void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
              }
            `,
            fragmentShader: `
              uniform sampler2D tex;
              uniform vec3 color;
              uniform float threshold;
              varying vec2 vUv;
              void main() {
                vec4 texColor = texture2D(tex, vUv);
                float diff = distance(texColor.rgb, color);
                if (diff < threshold) {
                  discard;
                } else {
                  gl_FragColor = texColor;
                }
              }
            `,
            transparent: true
          });
        },
        update: function(data) {
          this.material.uniforms.src.value = new THREE.VideoTexture(data.src);
        }
      });
    </script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { 
            position: absolute; z-index: 1000; bottom: 30px; left: 50%; 
            transform: translateX(-50%); width: 100%; text-align: center;
        }
        button { 
            padding: 15px 30px; border-radius: 30px; border: none; 
            background: #e91e63; color: white; font-weight: bold; font-size: 18px;
        }
        /* Esto elimina el fondo azul de carga si se queda pegado */
        .a-loader-title { display: none !important; }
    </style>
</head>
<body>

    <div id="ui">
        <button id="startBtn">ACTIVAR CÁMARA</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="./video.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video material="shader: chromakey; src: #vid; color: 0 1 0; threshold: 0.1" 
                     width="1" height="1" position="0 0 0.01">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector("#startBtn");
        const sceneEl = document.querySelector('a-scene');
        const video = document.querySelector("#vid");

        btn.addEventListener('click', () => {
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); 
            
            // Forzamos el play del video
            video.play();
            btn.style.display = "none";
        });
    </script>
</body>
</html>
