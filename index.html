<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: transparent; }
        
        /* Aseguramos que la cámara esté al fondo y sea visible */
        canvas { 
            position: absolute !important; 
            z-index: 0 !important; 
        }

        #ui { 
            position: absolute; z-index: 1000; bottom: 30px; left: 50%; 
            transform: translateX(-50%); width: 100%; text-align: center;
        }

        .btn { 
            padding: 16px 32px; border-radius: 50px; border: none; 
            background: #00f2ff; color: #000; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,242,255,0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="ui">
        <button id="startBtn" class="btn">ACTIVAR CÁMARA</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" 
             embedded 
             renderer="colorManagement: true; alpha: true; antialias: true;" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="./video.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" 
                     width="1" height="1" 
                     position="0 0 0.1" 
                     material="shader: flat; blending: additive; transparent: true">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector("#startBtn");
        const sceneEl = document.querySelector('a-scene');
        const video = document.querySelector("#vid");

        btn.addEventListener('click', () => {
            const arSystem = sceneEl.systems["mindar-image-system"];
            
            // 1. Iniciamos la cámara primero
            arSystem.start(); 
            
            // 2. Esperamos un segundo para que la cámara estabilice antes de soltar el audio
            setTimeout(() => {
                video.muted = false;
                video.play().catch(() => {
                    // Si el navegador se pone terco con el audio, lo silenciamos para que al menos se vea el video
                    video.muted = true;
                    video.play();
                });
            }, 1000);
            
            btn.style.display = "none";
        });

        // Evento de seguridad: Si la cámara falla, esto nos avisará en la consola
        sceneEl.addEventListener("arError", (event) => {
            console.log("Error de AR detectado:", event);
        });
    </script>
</body>
</html>
