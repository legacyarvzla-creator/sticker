<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <script>
      AFRAME.registerShader('chromakey', {
        schema: {
          src: {type: 'map'},
          color: {type: 'color', default: '0 1 0'}, // Color a quitar (Verde Puro RGB)
          threshold: {type: 'number', default: 0.1}, // Qué tan exacto debe ser el color
        },
        init: function (data) {
          const videoTexture = new THREE.VideoTexture(data.src);
          videoTexture.minFilter = THREE.LinearFilter;
          this.material = new THREE.ShaderMaterial({
            uniforms: {
              tex: {value: videoTexture},
              color: {value: new THREE.Color(data.color)},
              threshold: {value: data.threshold}
            },
            vertexShader: `
              varying vec2 vUv;
              void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
              }
            `,
            fragmentShader: `
              uniform sampler2D tex;
              uniform vec3 color;
              uniform float threshold;
              varying vec2 vUv;
              void main() {
                vec4 texColor = texture2D(tex, vUv);
                float diff = distance(texColor.rgb, color);
                if (diff < threshold) {
                  discard;
                } else {
                  gl_FragColor = texColor;
                }
              }
            `,
            transparent: true // ¡Importante!
          });
        },
        update: function (data) {
          this.material.uniforms.src.value = new THREE.VideoTexture(data.src);
        }
      });
    </script>
    <style>
        /* 2. CSS Reset agresivo para forzar pantalla completa sin descuadres */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            position: fixed; /* Evita scroll en iOS */
        }

        #ui { 
            position: absolute; 
            z-index: 9999; 
            bottom: 40px; /* Un poco más arriba para salvar barras de navegación */
            left: 50%; 
            transform: translateX(-50%); 
            width: 80%; 
            text-align: center;
        }

        button { 
            padding: 16px 32px; 
            border-radius: 50px; 
            border: none; 
            background: #e91e63; 
            color: white; 
            font-size: 18px;
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            width: 100%; /* Botón más grande para móviles */
        }

        /* Corrección de la pantalla dividida */
        .a-canvas {
            width: 100% !important;
            height: 100% !important;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <div id="ui">
        <button id="startBtn">COMENZAR EXPERIENCIA</button>
    </div>

    <video id="vid" src="./video.mp4" 
           loop="true" 
           crossorigin="anonymous" 
           playsinline 
           webkit-playsinline 
           style="display:none">
    </video>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;" 
             embedded 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video material="shader: chromakey; src: #vid; color: 0 1 0; threshold: 0.1" 
                     width="1" 
                     height="1" 
                     position="0 0 0.01">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector("#startBtn");
        const sceneEl = document.querySelector('a-scene');
        const video = document.querySelector("#vid");

        btn.addEventListener('click', () => {
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); 
            
            // Intentamos reproducir con audio. Si falla, al menos el tracking arranca.
            video.play().then(() => {
                console.log("Video con audio arrancó");
            }).catch(err => {
                console.log("Audio bloqueado, reproduciendo en silencio:", err);
                video.muted = true;
                video.play();
            });
            
            btn.style.display = "none";
        });
    </script>
</body>
</html>
