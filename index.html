<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { 
            position: absolute; z-index: 1000; bottom: 30px; left: 50%; 
            transform: translateX(-50%); width: 100%; text-align: center;
        }
        button { 
            padding: 18px 35px; border-radius: 40px; border: none; 
            background: #00f2ff; color: #000; font-weight: bold; font-size: 18px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
        }
        /* Esto asegura que la cámara ocupe TODO el fondo */
        .a-canvas { object-fit: cover !important; }
    </style>
</head>
<body>

    <div id="ui">
        <button id="startBtn">INICIAR EXPERIENCIA</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;" 
             embedded color-space="sRGB" renderer="colorManagement: true; alpha: true" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="./video.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" 
                     width="1" height="1" 
                     position="0 0 0.1" 
                     material="shader: flat; blending: additive; transparent: true; side: double">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector("#startBtn");
        const sceneEl = document.querySelector('a-scene');
        const video = document.querySelector("#vid");

        btn.addEventListener('click', () => {
            // 1. Arrancar el sistema AR
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); 
            
            // 2. Arrancar el video con audio (la interacción del botón lo permite)
            video.muted = false; // Nos aseguramos que no esté mudo
            video.play().catch(err => {
                console.log("Error de audio, reintentando...", err);
                video.muted = true; // Si falla, que al menos se vea
                video.play();
            });
            
            btn.style.display = "none";
        });
    </script>
</body>
</html>
