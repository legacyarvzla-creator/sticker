<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        /* RESET TOTAL PARA EVITAR PANTALLA DIVIDIDA */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
        }

        #ui { 
            position: absolute; z-index: 1000; bottom: 30px; left: 50%; 
            transform: translateX(-50%); width: 100%; text-align: center;
        }

        .btn { 
            padding: 16px 32px; border-radius: 50px; border: none; 
            background: #00f2ff; color: #000; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,242,255,0.4);
        }

        /* FORZAR LA CÁMARA A PANTALLA COMPLETA */
        .mindar-ui-overlay { z-index: 10; }
        canvas { 
            width: 100vw !important; 
            height: 100vh !important; 
            object-fit: cover !important; 
        }
    </style>
</head>
<body>

    <div id="ui">
        <button id="startBtn" class="btn">ACTIVAR CÁMARA</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;" 
             embedded 
             renderer="colorManagement: true; alpha: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="./video.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" 
                     width="1" height="1" 
                     position="0 0 0.1" 
                     material="shader: flat; blending: additive; transparent: true">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector("#startBtn");
        const sceneEl = document.querySelector('a-scene');
        const video = document.querySelector("#vid");

        btn.addEventListener('click', () => {
            const arSystem = sceneEl.systems["mindar-image-system"];
            
            // 1. Encender AR
            arSystem.start(); 
            
            // 2. Play al video con audio
            video.muted = false;
            video.play().then(() => {
                console.log("Video y audio OK");
            }).catch(err => {
                console.log("Fallo audio, forzando video");
                video.muted = true;
                video.play();
            });
            
            btn.style.display = "none";
        });
    </script>
</body>
</html>
