<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        /* Forzamos que nada se salga de los bordes */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        #ui { 
            position: absolute; z-index: 1000; bottom: 30px; left: 50%; 
            transform: translateX(-50%); width: 100%; text-align: center;
        }
        button { 
            padding: 15px 30px; border-radius: 30px; border: none; 
            background: #e91e63; color: white; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Esto corrige la pantalla dividida y el descuadre */
        .a-canvas { width: 100% !important; height: 100% !important; position: absolute; top: 0; left: 0; }
        video { object-fit: cover; }
    </style>
</head>
<body>

    <div id="ui">
        <button id="startBtn">ACTIVAR CÁMARA</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="./video.mp4" loop="true" crossorigin="anonymous" muted playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="1" position="0 0 0.01"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector("#startBtn");
        const sceneEl = document.querySelector('a-scene');
        const video = document.querySelector("#vid");

        btn.addEventListener('click', () => {
            // 1. Iniciamos el sistema de AR
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); 
            
            // 2. Intentamos reproducir el video
            video.play();
            
            // 3. Ocultamos el botón
            btn.style.display = "none";
        });
    </script>
</body>
</html>
